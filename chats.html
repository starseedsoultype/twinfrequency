<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Twin Frequency — Circle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --deep: #04030a;
    --surface: #0d0b18;
    --card: #110f1e;
    --border: rgba(201,169,110,0.12);
    --gold: #c9a96e;
    --gold-soft: rgba(201,169,110,0.75);
    --text: #e8e0d5;
    --muted: rgba(232,224,213,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--deep);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── LOADING ── */
  .loading-screen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--deep);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s;
  }
  .loading-screen.hide { opacity: 0; pointer-events: none; }
  .loading-pulse {
    width: 32px; height: 32px;
    border: 1px solid rgba(201,169,110,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VIEWS ── */
  .view { position: fixed; inset: 0; display: flex; flex-direction: column; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .view.hidden { transform: translateX(100%); pointer-events: none; }

  /* ── TOP NAV ── */
  .top-nav {
    flex-shrink: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(4,3,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 0.08em;
    color: var(--text);
  }
  .nav-logo em { color: var(--gold); font-style: italic; }
  .nav-icons { display: flex; gap: 16px; }
  .nav-icon { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; padding: 4px; }
  .nav-icon:hover { opacity: 1; }
  .nav-icon.active { opacity: 1; }

  /* ── TABS ── */
  .tabs {
    flex-shrink: 0;
    display: flex;
    border-bottom: 1px solid var(--border);
    background: rgba(4,3,10,0.9);
  }
  .tab {
    flex: 1; padding: 14px 8px;
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); text-align: center; cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: all 0.2s; margin-bottom: -1px;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 20px 20px 10px;
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted);
  }

  /* ── GROUP CHAT ITEM ── */
  .circle-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.2s;
  }
  .circle-item:hover { background: rgba(201,169,110,0.04); }
  .circle-avatar {
    flex-shrink: 0;
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    border: 1px solid var(--border);
    background: var(--card);
    position: relative;
  }
  .circle-avatar .online-dot {
    position: absolute; bottom: 2px; right: 2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #4caf82; border: 2px solid var(--deep);
  }
  .circle-info { flex: 1; min-width: 0; }
  .circle-name {
    font-size: 13px; font-weight: 300; letter-spacing: 0.05em;
    color: var(--text); margin-bottom: 3px;
  }
  .circle-preview {
    font-size: 11px; color: var(--muted); letter-spacing: 0.03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .circle-meta { flex-shrink: 0; text-align: right; }
  .circle-time { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 4px; }
  .circle-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    background: var(--gold); border-radius: 9px;
    font-size: 10px; color: var(--deep); font-weight: 400;
  }

  /* ── MATCH CHAT ITEM ── */
  .match-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.2s;
  }
  .match-item:hover { background: rgba(201,169,110,0.04); }
  .match-avatar {
    flex-shrink: 0;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--card) center/cover no-repeat;
    border: 1px solid var(--border);
    position: relative;
  }
  .match-avatar .type-ring {
    position: absolute; inset: -3px; border-radius: 50%;
    border: 1.5px solid transparent;
  }
  .match-info { flex: 1; min-width: 0; }
  .match-name {
    font-size: 13px; font-weight: 300; letter-spacing: 0.05em;
    color: var(--text); margin-bottom: 2px;
  }
  .match-connection {
    display: inline-flex; align-items: center; gap: 5px;
    margin-bottom: 3px;
  }
  .match-connection-dot { width: 5px; height: 5px; border-radius: 50%; }
  .match-connection-name {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .match-preview {
    font-size: 11px; color: var(--muted); letter-spacing: 0.03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .match-meta { flex-shrink: 0; text-align: right; }
  .match-time { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 4px; }
  .match-unread {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    background: var(--gold); border-radius: 9px;
    font-size: 10px; color: var(--deep); font-weight: 400;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 40px; text-align: center; gap: 16px;
  }
  .empty-icon { font-size: 36px; opacity: 0.4; }
  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; color: var(--text);
  }
  .empty-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; line-height: 1.7; }
  .empty-btn {
    margin-top: 8px; padding: 12px 28px;
    background: transparent; border: 1px solid rgba(201,169,110,0.35);
    border-radius: 2px; color: var(--gold);
    font-family: 'Jost', sans-serif; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s;
  }
  .empty-btn:hover { background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.6); }

  /* ════════════════════════════════════════
     CHAT VIEW
  ════════════════════════════════════════ */
  #chat-view .top-nav { justify-content: flex-start; gap: 12px; }
  .chat-back {
    background: none; border: none; color: var(--gold-soft);
    cursor: pointer; padding: 4px; display: flex; align-items: center;
    transition: color 0.2s;
  }
  .chat-back:hover { color: var(--gold); }
  .chat-nav-info { flex: 1; min-width: 0; }
  .chat-nav-name {
    font-size: 14px; letter-spacing: 0.05em; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-nav-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; }
  .chat-menu-btn {
    background: none; border: none; color: var(--gold-soft);
    cursor: pointer; padding: 4px; transition: color 0.2s;
  }
  .chat-menu-btn:hover { color: var(--gold); }

  /* ── CONNECTION HEADER (личный чат) ── */
  .connection-header {
    flex-shrink: 0;
    padding: 14px 20px;
    background: rgba(13,11,24,0.95);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: background 0.2s;
  }
  .connection-header:hover { background: rgba(201,169,110,0.04); }
  .conn-origins {
    flex: 1; min-width: 0;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conn-origins em { color: var(--gold-soft); font-style: normal; }
  .conn-type-badge {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 20px;
  }
  .conn-type-dot { width: 5px; height: 5px; border-radius: 50%; }
  .conn-type-name { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; }
  .conn-library-arrow { font-size: 10px; color: var(--muted); }

  /* ── MESSAGES ── */
  .messages-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .messages-area::-webkit-scrollbar { display: none; }

  /* Системное сообщение */
  .msg-system {
    text-align: center; padding: 8px 20px;
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
    font-style: italic;
  }

  /* Сообщение */
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-avatar {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--card) center/cover no-repeat;
    border: 1px solid var(--border);
  }
  .msg-bubble {
    max-width: 72%; padding: 10px 14px;
    border-radius: 16px 16px 16px 4px;
    font-size: 13px; line-height: 1.55; letter-spacing: 0.02em;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text);
    word-break: break-word;
  }
  .msg-row.mine .msg-bubble {
    border-radius: 16px 16px 4px 16px;
    background: rgba(201,169,110,0.1);
    border-color: rgba(201,169,110,0.2);
  }
  .msg-time {
    font-size: 9px; color: var(--muted); letter-spacing: 0.05em;
    padding: 0 4px 2px; align-self: flex-end;
  }

  /* Дата-разделитель */
  .msg-date {
    text-align: center; font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    padding: 8px 0;
  }

  /* ── INPUT AREA ── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 16px 28px;
    background: rgba(4,3,10,0.95);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .msg-input-wrap {
    flex: 1;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 16px;
    display: flex; align-items: center;
    transition: border-color 0.2s;
  }
  .msg-input-wrap:focus-within { border-color: rgba(201,169,110,0.35); }
  .msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 300; letter-spacing: 0.03em;
    resize: none; max-height: 100px; line-height: 1.4;
  }
  .msg-input::placeholder { color: var(--muted); }
  .send-btn {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .send-btn:hover { background: rgba(201,169,110,0.25); border-color: rgba(201,169,110,0.6); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── CONTEXT MENU ── */
  .context-menu {
    position: fixed; z-index: 300;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    min-width: 180px;
    transform-origin: top right;
    animation: menuIn 0.15s ease;
  }
  @keyframes menuIn { from { opacity:0; transform: scale(0.92); } to { opacity:1; transform: scale(1); } }
  .context-menu-item {
    padding: 13px 18px; font-size: 12px; letter-spacing: 0.1em;
    color: var(--text); cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 10px;
  }
  .context-menu-item:hover { background: rgba(201,169,110,0.06); }
  .context-menu-item.danger { color: #e07070; }
  .context-menu-item.danger:hover { background: rgba(224,112,112,0.06); }
  .context-menu-divider { height: 1px; background: var(--border); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(4,3,10,0.85); backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-sheet {
    width: 100%; max-width: 480px;
    background: var(--surface); border-radius: 16px 16px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    padding: 24px 24px 40px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 3px; border-radius: 2px;
    background: rgba(201,169,110,0.2); margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; color: var(--text);
    margin-bottom: 8px;
  }
  .modal-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; line-height: 1.6; margin-bottom: 20px; }
  .modal-btn {
    width: 100%; padding: 14px;
    background: transparent; border: 1px solid rgba(201,169,110,0.3);
    border-radius: 2px; color: var(--gold);
    font-family: 'Jost', sans-serif; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; margin-bottom: 10px;
  }
  .modal-btn:hover { background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.6); }
  .modal-btn.danger { color: #e07070; border-color: rgba(224,112,112,0.3); }
  .modal-btn.danger:hover { background: rgba(224,112,112,0.06); border-color: rgba(224,112,112,0.6); }
  .modal-cancel {
    width: 100%; padding: 12px; background: none; border: none;
    color: var(--muted); font-family: 'Jost', sans-serif;
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; transition: color 0.2s;
  }
  .modal-cancel:hover { color: var(--text); }

  /* ── GROUP CHAT HEADER ── */
  .group-header {
    flex-shrink: 0;
    padding: 16px 20px;
    background: rgba(13,11,24,0.95);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .group-header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 300; color: var(--text);
    margin-bottom: 4px;
  }
  .group-header-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; }
  .group-origins-chips {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin-top: 10px;
  }
  .origin-chip {
    padding: 3px 10px; border: 1px solid var(--border); border-radius: 12px;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }

  /* ── NEBULA BG ── */
  .nebula {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; opacity: 0.04;
  }
  .nebula-1 { width: 300px; height: 300px; background: radial-gradient(circle, #c9a96e, transparent); top: -100px; right: -100px; }
  .nebula-2 { width: 250px; height: 250px; background: radial-gradient(circle, #7060a8, transparent); bottom: 100px; left: -80px; }
</style>
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="loading-pulse"></div>
</div>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<!-- ════════════════════════════════════════
     LIST VIEW
════════════════════════════════════════ -->
<div class="view" id="list-view">
  <nav class="top-nav">
    <div class="nav-logo">Twin<em>F</em></div>
    <div class="nav-icons">
      <div class="nav-icon active" title="Circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="var(--gold)" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nav-icon" onclick="window.location.href='feed.html'" title="Explore">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="var(--gold-soft)" stroke-width="1"/>
          <circle cx="12" cy="12" r="3" stroke="var(--gold-soft)" stroke-width="1"/>
          <line x1="12" y1="3" x2="12" y2="6" stroke="var(--gold-soft)" stroke-width="1"/>
          <line x1="12" y1="18" x2="12" y2="21" stroke="var(--gold-soft)" stroke-width="1"/>
          <line x1="3" y1="12" x2="6" y2="12" stroke="var(--gold-soft)" stroke-width="1"/>
          <line x1="18" y1="12" x2="21" y2="12" stroke="var(--gold-soft)" stroke-width="1"/>
        </svg>
      </div>
      <div class="nav-icon" onclick="window.location.href='profile.html'" title="Profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="var(--gold-soft)" stroke-width="1"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="var(--gold-soft)" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </nav>

  <div class="tabs">
    <div class="tab active" id="tab-matches" onclick="switchTab('matches')">Matches</div>
    <div class="tab" id="tab-circle" onclick="switchTab('circle')">Circle</div>
  </div>

  <div class="scroll-area" id="list-scroll">
    <!-- Matches tab -->
    <div id="panel-matches">
      <div id="matches-list"></div>
    </div>
    <!-- Circle tab -->
    <div id="panel-circle" style="display:none">
      <div id="circle-list"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     CHAT VIEW
════════════════════════════════════════ -->
<div class="view hidden" id="chat-view">
  <nav class="top-nav">
    <button class="chat-back" onclick="closeChat()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="chat-nav-info">
      <div class="chat-nav-name" id="chat-nav-name">—</div>
      <div class="chat-nav-sub" id="chat-nav-sub">—</div>
    </div>
    <button class="chat-menu-btn" onclick="openChatMenu(event)" id="chat-menu-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="5" r="1.2" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="12" cy="19" r="1.2" fill="currentColor"/>
      </svg>
    </button>
  </nav>

  <!-- Connection header (личный чат) -->
  <div class="connection-header" id="connection-header" style="display:none" onclick="openConnectionLibrary()">
    <div class="conn-origins" id="conn-origins">—</div>
    <div class="conn-type-badge" id="conn-type-badge">
      <div class="conn-type-dot" id="conn-type-dot"></div>
      <span class="conn-type-name" id="conn-type-name">—</span>
      <span class="conn-library-arrow">›</span>
    </div>
  </div>

  <!-- Group header (групповой чат) -->
  <div class="group-header" id="group-header" style="display:none">
    <div class="group-header-name" id="group-header-name">—</div>
    <div class="group-header-sub" id="group-header-sub">—</div>
    <div class="group-origins-chips" id="group-origins-chips"></div>
  </div>

  <div class="messages-area" id="messages-area"></div>

  <div class="input-area">
    <div class="msg-input-wrap">
      <textarea class="msg-input" id="msg-input" placeholder="Write across the frequency..." rows="1"
        oninput="autoResize(this)" onkeydown="handleMsgKey(event)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── CONTEXT MENU ── -->
<div class="context-menu" id="context-menu" style="display:none"></div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">—</div>
    <div class="modal-sub" id="modal-sub">—</div>
    <div id="modal-actions"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const SUPABASE_URL = 'https://pewgupxikbswhaqxjrwk.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBld2d1cHhpa2Jzd2hhcXhqcndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjY0MTEsImV4cCI6MjA5MDg0MjQxMX0.rQIz0R_4Oz6VqHgSvjx9YAtF8BojdcMU7RcqDiVP1NU'
  // ──────────────────────────────────────────────────────────

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // ─── Connection type colors ───────────────────────────────
  const CONNECTION_COLORS = {
    'Frequency Twins': '#c9a96e',
    'Twin Stars':      '#d4a0b0',
    'Cosmic Flow':     '#b090c8',
    'Mirror Portals':  '#a080c0',
    'Celestial Mentor':'#c0b8e0',
    'Karmic Bonds':    '#7080c8',
    'Shadow Contracts':'#6050a0',
    'Black Holes':     '#4050a0',
    'Star Alchemy':    '#5080c8',
    'Eternal Reflection':'#d0d0e8',
    'Unknown':         '#7a7090'
  }

  // ─── Origin Groups ────────────────────────────────────────
  // Origin-to-group mapping for Circle chat grouping only
  const ORIGIN_GROUP = {
    'Siriusian':1,'Pleiadian':1,'Lemurian':1,'Cassiopeian':1,'Procyonian':1,'Lyran':1,
    'Arcturian':2,'Orion':2,'Vegan':2,'Zeta Reticulan':2,'Epsilon Eridan':2,'Atlantean':2,
    'Andromedan':3,'Polarisian':3,'Nibiruan':3,'Egyptian':3,'Titan':3,'Blue Avian':3,
    'Tau Cetian':4,'Aldebaran':4,'Centaurian':4,'Herculean':4,'Anunnaki':4,'Hyperborean':4
  }
  const GROUP_NAMES = {
    1: 'Starborn Circle', 2: 'Celestial Circle',
    3: 'Energy Circle',   4: 'Ancient Circle'
  }

  const GROUP_ORIGINS = {
    1: ['Siriusian','Pleiadian','Lemurian','Cassiopeian','Procyonian','Lyran'],
    2: ['Arcturian','Orion','Vegan','Zeta Reticulan','Epsilon Eridan','Atlantean'],
    3: ['Andromedan','Polarisian','Nibiruan','Egyptian','Titan','Blue Avian'],
    4: ['Tau Cetian','Aldebaran','Centaurian','Herculean','Anunnaki','Hyperborean']
  }

  const GROUP_EMOJIS = { 1: '✦', 2: '◈', 3: '⬡', 4: '◉', 0: '?' }

  // Connection type is computed server-side and stored in matches.connection_type
  function getConnectionType(o1, o2) {
    if (!o1 || !o2 || o1 === 'Unknown' || o2 === 'Unknown') return 'Unknown'
    return 'Cosmic Flow' // fallback only — real value comes from DB
  }

  // ─── State ────────────────────────────────────────────────
  let myUser = null
  let myProfile = null
  let currentChat = null   // { type: 'match'|'group', id, data }
  let realtimeSub = null
  let currentTab = 'matches'

  // ─── Init ─────────────────────────────────────────────────
  window.addEventListener('load', async () => {
    const { data: sessionData } = await sb.auth.getSession()
    if (!sessionData.session) {
      window.location.href = 'login.html'
      return
    }
    myUser = sessionData.session.user
    const { data: me } = await sb.from('profiles').select('*').eq('id', myUser.id).single()
    myProfile = me

    await loadMatches()
    renderCircle()

    document.getElementById('loader').classList.add('hide')
  })

  // ─── Tabs ─────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    document.getElementById('tab-matches').classList.toggle('active', tab === 'matches')
    document.getElementById('tab-circle').classList.toggle('active', tab === 'circle')
    document.getElementById('panel-matches').style.display = tab === 'matches' ? '' : 'none'
    document.getElementById('panel-circle').style.display = tab === 'circle' ? '' : 'none'
  }

  // ─── Load Matches ─────────────────────────────────────────
  async function loadMatches() {
    // Загружаем мэтчи из таблицы matches
    const { data: matches } = await sb
      .from('matches')
      .select('*, profile1:profiles!matches_user1_fkey(*), profile2:profiles!matches_user2_fkey(*)')
      .or(`user1.eq.${myUser.id},user2.eq.${myUser.id}`)
      .order('created_at', { ascending: false })

    const container = document.getElementById('matches-list')

    if (!matches || matches.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <div class="empty-title">No matches yet</div>
          <div class="empty-sub">When two frequencies align,<br>your conversations will appear here.</div>
          <button class="empty-btn" onclick="window.location.href='feed.html'">Explore frequencies</button>
        </div>`
      return
    }

    container.innerHTML = ''
    for (const match of matches) {
      const other = match.user1 === myUser.id ? match.profile2 : match.profile1
      if (!other) continue

      const connType = match.connection_type || getConnectionType(myProfile?.origin, other.origin)
      const color = CONNECTION_COLORS[connType] || CONNECTION_COLORS['Cosmic Flow']

      // Загружаем последнее сообщение
      const { data: lastMsgs } = await sb
        .from('messages')
        .select('content, created_at, sender_id')
        .eq('match_id', match.id)
        .order('created_at', { ascending: false })
        .limit(1)

      const lastMsg = lastMsgs?.[0]
      const preview = lastMsg
        ? (lastMsg.sender_id === myUser.id ? 'You: ' : '') + lastMsg.content
        : 'A new frequency has aligned ✦'
      const timeStr = lastMsg ? formatTime(lastMsg.created_at) : formatTime(match.created_at)

      const item = document.createElement('div')
      item.className = 'match-item'
      item.onclick = () => openMatchChat(match, other, connType, color)
      item.innerHTML = `
        <div class="match-avatar" style="background-image:url('${other.photo_url || ''}')">
          <div class="type-ring" style="border-color:${color}60"></div>
        </div>
        <div class="match-info">
          <div class="match-name">${other.name || 'Unknown'}</div>
          <div class="match-connection">
            <div class="match-connection-dot" style="background:${color}"></div>
            <span class="match-connection-name" style="color:${color}">${connType}</span>
          </div>
          <div class="match-preview">${escapeHtml(preview)}</div>
        </div>
        <div class="match-meta">
          <div class="match-time">${timeStr}</div>
        </div>`
      container.appendChild(item)
    }
  }

  // ─── Render Circle ────────────────────────────────────────
  function renderCircle() {
    const container = document.getElementById('circle-list')
    container.innerHTML = ''

    const myGroup = myProfile?.origin ? ORIGIN_GROUP[myProfile.origin] : 0
    const groupId = myGroup || 0

    // Мой групповой чат первым
    const myGroupName = groupId ? GROUP_NAMES[groupId] : 'Not Yet Determined'
    const myGroupOrigins = groupId ? GROUP_ORIGINS[groupId] : []
    const myEmoji = GROUP_EMOJIS[groupId] || '?'

    const header1 = document.createElement('div')
    header1.className = 'section-header'
    header1.textContent = 'Your Circle'
    container.appendChild(header1)

    const myItem = createCircleItem(myGroupName, myGroupOrigins, myEmoji, true, groupId)
    container.appendChild(myItem)

    // Остальные круги
    const header2 = document.createElement('div')
    header2.className = 'section-header'
    header2.textContent = 'Other Circles'
    container.appendChild(header2)

    const allGroups = [1, 2, 3, 4]
    for (const gid of allGroups) {
      if (gid === groupId) continue
      const item = createCircleItem(GROUP_NAMES[gid], GROUP_ORIGINS[gid], GROUP_EMOJIS[gid], false, gid)
      container.appendChild(item)
    }

    // Not Yet Determined (если не Unknown)
    if (groupId !== 0) {
      const nydItem = createCircleItem('Not Yet Determined', [], '?', false, 0)
      container.appendChild(nydItem)
    }
  }

  function createCircleItem(name, origins, emoji, isActive, groupId) {
    const item = document.createElement('div')
    item.className = 'circle-item'
    item.onclick = () => openGroupChat(name, origins, emoji, groupId)

    const previewText = isActive
      ? 'Your circle is speaking ✦'
      : `${origins.length || '?'} soul types`

    item.innerHTML = `
      <div class="circle-avatar" style="border-color:${isActive ? 'rgba(201,169,110,0.4)' : 'var(--border)'}">
        <span style="color:${isActive ? 'var(--gold)' : 'var(--muted)'}">${emoji}</span>
        ${isActive ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="circle-info">
        <div class="circle-name">${name}</div>
        <div class="circle-preview">${previewText}</div>
      </div>
      <div class="circle-meta">
        <div class="circle-time">now</div>
        ${isActive ? '<div class="circle-badge">✦</div>' : ''}
      </div>`
    return item
  }

  // ─── Open Match Chat ──────────────────────────────────────
  async function openMatchChat(match, other, connType, color) {
    currentChat = { type: 'match', matchId: match.id, other, connType, color }

    // Nav
    document.getElementById('chat-nav-name').textContent = other.name || 'Unknown'
    document.getElementById('chat-nav-sub').textContent = other.origin || ''

    // Connection header
    const connHeader = document.getElementById('connection-header')
    const myOrigin = myProfile?.origin || 'Unknown'
    const otherOrigin = other.origin || 'Unknown'
    document.getElementById('conn-origins').innerHTML =
      `<em>${myOrigin}</em> &nbsp;✦&nbsp; <em>${otherOrigin}</em>`
    document.getElementById('conn-type-dot').style.background = color
    document.getElementById('conn-type-name').textContent = connType
    document.getElementById('conn-type-name').style.color = color
    connHeader.style.display = 'flex'
    document.getElementById('group-header').style.display = 'none'

    // Show chat view
    document.getElementById('list-view').classList.add('hidden')
    document.getElementById('chat-view').classList.remove('hidden')
    document.getElementById('chat-menu-btn').style.display = ''

    // Load messages
    await loadMessages(match.id)

    // Subscribe to realtime
    subscribeToMessages(match.id)
  }

  // ─── Open Group Chat ──────────────────────────────────────
  function openGroupChat(name, origins, emoji, groupId) {
    currentChat = { type: 'group', groupId, name, origins }

    // Nav
    document.getElementById('chat-nav-name').textContent = name
    document.getElementById('chat-nav-sub').textContent = `${origins.length || '?'} soul types`

    // Group header
    document.getElementById('connection-header').style.display = 'none'
    const gh = document.getElementById('group-header')
    document.getElementById('group-header-name').textContent = name
    document.getElementById('group-header-sub').textContent =
      groupId === 0 ? 'For those still discovering their frequency' : 'Your origin circle'
    const chips = document.getElementById('group-origins-chips')
    chips.innerHTML = origins.map(o => `<div class="origin-chip">${o}</div>`).join('')
    gh.style.display = ''

    // Hide menu for group (no unmatch)
    document.getElementById('chat-menu-btn').style.display = 'none'

    // Show chat view
    document.getElementById('list-view').classList.add('hidden')
    document.getElementById('chat-view').classList.remove('hidden')

    // Load group messages
    loadGroupMessages(groupId)
    subscribeToGroupMessages(groupId)
  }

  // ─── Close Chat ───────────────────────────────────────────
  function closeChat() {
    if (realtimeSub) {
      sb.removeChannel(realtimeSub)
      realtimeSub = null
    }
    currentChat = null
    document.getElementById('chat-view').classList.add('hidden')
    document.getElementById('list-view').classList.remove('hidden')
    document.getElementById('messages-area').innerHTML = ''
    document.getElementById('msg-input').value = ''
  }

  // ─── Load Messages ────────────────────────────────────────
  async function loadMessages(matchId) {
    const { data: msgs } = await sb
      .from('messages')
      .select('*, sender:profiles!messages_sender_id_fkey(name, photo_url)')
      .eq('match_id', matchId)
      .order('created_at', { ascending: true })

    renderMessages(msgs || [], false)
  }

  async function loadGroupMessages(groupId) {
    const { data: msgs } = await sb
      .from('group_messages')
      .select('*, sender:profiles!group_messages_sender_id_fkey(name, photo_url)')
      .eq('circle_id', groupId)
      .order('created_at', { ascending: true })
      .limit(50)

    renderMessages(msgs || [], true)
  }

  function renderMessages(msgs, isGroup) {
    const area = document.getElementById('messages-area')
    area.innerHTML = ''

    if (msgs.length === 0) {
      const systemMsg = document.createElement('div')
      systemMsg.className = 'msg-system'
      systemMsg.textContent = isGroup
        ? 'The circle is open. Be the first to speak.'
        : 'A new frequency has aligned. Begin the conversation.'
      area.appendChild(systemMsg)
    }

    let lastDate = null
    for (const msg of msgs) {
      const msgDate = new Date(msg.created_at).toDateString()
      if (msgDate !== lastDate) {
        const dateSep = document.createElement('div')
        dateSep.className = 'msg-date'
        dateSep.textContent = formatDate(msg.created_at)
        area.appendChild(dateSep)
        lastDate = msgDate
      }
      area.appendChild(createMsgEl(msg))
    }

    area.scrollTop = area.scrollHeight
  }

  function createMsgEl(msg) {
    const isMine = msg.sender_id === myUser.id
    const row = document.createElement('div')
    row.className = 'msg-row' + (isMine ? ' mine' : '')
    row.dataset.msgId = msg.id

    const avatarUrl = msg.sender?.photo_url || ''
    const bubble = escapeHtml(msg.content || '')
    const time = formatTime(msg.created_at)

    row.innerHTML = `
      ${!isMine ? `<div class="msg-avatar" style="background-image:url('${avatarUrl}')"></div>` : ''}
      <div class="msg-bubble">${bubble}</div>
      <div class="msg-time">${time}</div>
      ${isMine ? `<div class="msg-avatar" style="background-image:url('${myProfile?.photo_url || ''}')"></div>` : ''}`

    return row
  }

  // ─── Send Message ─────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input')
    const content = input.value.trim()
    if (!content || !currentChat) return

    input.value = ''
    autoResize(input)

    if (currentChat.type === 'match') {
      await sb.from('messages').insert({
        match_id: currentChat.matchId,
        sender_id: myUser.id,
        content
      })
    } else {
      await sb.from('group_messages').insert({
        circle_id: currentChat.groupId,
        sender_id: myUser.id,
        content
      })
    }
  }

  function handleMsgKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  }

  // ─── Realtime ─────────────────────────────────────────────
  function subscribeToMessages(matchId) {
    if (realtimeSub) sb.removeChannel(realtimeSub)
    realtimeSub = sb
      .channel(`messages:${matchId}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `match_id=eq.${matchId}`
      }, async (payload) => {
        const msg = payload.new
        // Загружаем данные отправителя
        const { data: sender } = await sb.from('profiles').select('name, photo_url').eq('id', msg.sender_id).single()
        msg.sender = sender
        const area = document.getElementById('messages-area')
        area.appendChild(createMsgEl(msg))
        area.scrollTop = area.scrollHeight
      })
      .subscribe()
  }

  function subscribeToGroupMessages(groupId) {
    if (realtimeSub) sb.removeChannel(realtimeSub)
    realtimeSub = sb
      .channel(`group_messages:${groupId}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'group_messages',
        filter: `circle_id=eq.${groupId}`
      }, async (payload) => {
        const msg = payload.new
        const { data: sender } = await sb.from('profiles').select('name, photo_url').eq('id', msg.sender_id).single()
        msg.sender = sender
        const area = document.getElementById('messages-area')
        area.appendChild(createMsgEl(msg))
        area.scrollTop = area.scrollHeight
      })
      .subscribe()
  }

  // ─── Chat Menu ────────────────────────────────────────────
  function openChatMenu(e) {
    e.stopPropagation()
    const menu = document.getElementById('context-menu')
    const btn = document.getElementById('chat-menu-btn')
    const rect = btn.getBoundingClientRect()

    menu.innerHTML = `
      <div class="context-menu-item" onclick="reportUser()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Report
      </div>
      <div class="context-menu-item" onclick="blockUser()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M4.93 4.93l14.14 14.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Block
      </div>
      <div class="context-menu-divider"></div>
      <div class="context-menu-item danger" onclick="unmatchUser()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Unmatch
      </div>`

    menu.style.display = 'block'
    menu.style.top = (rect.bottom + 8) + 'px'
    menu.style.right = (window.innerWidth - rect.right) + 'px'

    setTimeout(() => document.addEventListener('click', closeContextMenu, { once: true }), 0)
  }

  function closeContextMenu() {
    document.getElementById('context-menu').style.display = 'none'
  }

  // ─── Actions ──────────────────────────────────────────────
  function reportUser() {
    closeContextMenu()
    showModal(
      'Report this person',
      'Your report will be reviewed. This person will not be notified.',
      [{ text: 'Send Report', action: async () => {
        // TODO: insert into reports table
        closeModal()
        showToast('Report sent')
      }}]
    )
  }

  function blockUser() {
    closeContextMenu()
    showModal(
      'Block this person',
      'They will no longer appear in your feed and cannot message you.',
      [{ text: 'Block', action: async () => {
        // TODO: insert into blocks table
        closeModal()
        closeChat()
        showToast('User blocked')
      }, danger: true }]
    )
  }

  function unmatchUser() {
    closeContextMenu()
    showModal(
      'Unmatch',
      'This will remove the match and delete all messages for both of you. This cannot be undone.',
      [{ text: 'Unmatch', action: async () => {
        if (currentChat?.matchId) {
          await sb.from('messages').delete().eq('match_id', currentChat.matchId)
          await sb.from('matches').delete().eq('id', currentChat.matchId)
        }
        closeModal()
        closeChat()
        await loadMatches()
        showToast('Unmatched')
      }, danger: true }]
    )
  }

  function openConnectionLibrary() {
    if (currentChat?.connType && currentChat.connType !== 'Unknown') {
      window.location.href = `library.html?type=${encodeURIComponent(currentChat.connType)}`
    }
  }

  // ─── Modal ────────────────────────────────────────────────
  function showModal(title, sub, actions) {
    document.getElementById('modal-title').textContent = title
    document.getElementById('modal-sub').textContent = sub
    const actionsEl = document.getElementById('modal-actions')
    actionsEl.innerHTML = ''
    for (const a of actions) {
      const btn = document.createElement('button')
      btn.className = 'modal-btn' + (a.danger ? ' danger' : '')
      btn.textContent = a.text
      btn.onclick = a.action
      actionsEl.appendChild(btn)
    }
    document.getElementById('modal-overlay').classList.add('show')
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal-overlay')) return
    document.getElementById('modal-overlay').classList.remove('show')
  }

  // ─── Toast ────────────────────────────────────────────────
  function showToast(text) {
    const t = document.createElement('div')
    t.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
      background:var(--card);border:1px solid var(--border);border-radius:20px;
      padding:10px 20px;font-size:11px;letter-spacing:0.15em;color:var(--gold);
      z-index:500;animation:fadeUp 0.3s ease;pointer-events:none;`
    t.textContent = text
    document.body.appendChild(t)
    setTimeout(() => t.remove(), 2500)
  }

  // ─── Helpers ──────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function formatTime(iso) {
    if (!iso) return ''
    const d = new Date(iso)
    const now = new Date()
    const diff = now - d
    if (diff < 60000) return 'now'
    if (diff < 3600000) return Math.floor(diff/60000) + 'm'
    if (diff < 86400000) return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
    return d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
  }

  function formatDate(iso) {
    const d = new Date(iso)
    const now = new Date()
    if (d.toDateString() === now.toDateString()) return 'Today'
    const yesterday = new Date(now); yesterday.setDate(now.getDate()-1)
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday'
    return d.toLocaleDateString('en', { month: 'long', day: 'numeric' })
  }
</script>
