// ── HELPERS ──────────────────────────────────────────────────────────────────
function chPairQuality(a, b) {
  if (a === b) return `mirror_${a}`;
  const pair = [Math.min(a,b), Math.max(a,b)];
  const map = {
    "1,4":"ideal","2,3":"harmonic","1,2":"tandem",
    "3,4":"trap","2,4":"mismatch","1,3":"conflict"
  };
  return map[pair.join(",")] || "unknown";
}

function analyzePair(t1, t2) {
  const result = {};
  for (const f of ["R","E","M","L"]) {
    const c1 = t1.funcs.indexOf(f) + 1;
    const c2 = t2.funcs.indexOf(f) + 1;
    result[f] = { c1, c2, q: chPairQuality(c1,c2) };
  }
  return result;
}

function classifyBond(t1, t2) {
  if (t1.name === t2.name) return "Eternal Reflection";
  const scoreMap = {ideal:3,harmonic:2,tandem:1,mirror_1:0,mirror_2:0,mirror_3:0,mirror_4:0,mismatch:-1,trap:-2,conflict:-3};
  const analysis = analyzePair(t1, t2);
  const s = Object.values(analysis).reduce((acc,v) => acc + (scoreMap[v.q]||0), 0);
  if (s >= 10) return "Frequency Twins";
  if (s >= 6)  return "Twin Stars";
  if (s >= 4)  return "Cosmic Flow";
  if (s >= 2)  return "Mirror Portals";
  if (s >= 0)  return "Celestial Mentor";
  if (s >= -1) return "Karmic Bonds";
  if (s >= -3) return "Shadow Contracts";
  if (s >= -5) return "Black Holes";
  return "Star Alchemy";
}

function blendColors(funcs) {
  let r=0,g=0,b=0;
  funcs.forEach((f,i) => {
    const w = CH_WEIGHT[i+1];
    const c = FUNC_COLORS[f];
    r += c.r*w; g += c.g*w; b += c.b*w;
  });
  return { r:Math.round(r), g:Math.round(g), b:Math.round(b) };
}

// ── DRAW MERGED CRYSTALS ──────────────────────────────────────────────────────

function drawMergedCrystals(t1, t2, bondName) {
  const canvas = document.getElementById('mergedCrystal');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#07050f';
  ctx.fillRect(0,0,W,H);

  const blend1 = blendColors(t1.funcs);
  const blend2 = blendColors(t2.funcs);
  const blendC = {
    r: Math.round((blend1.r + blend2.r) / 2),
    g: Math.round((blend1.g + blend2.g) / 2),
    b: Math.round((blend1.b + blend2.b) / 2),
  };

  // Background glow
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100);
  bg.addColorStop(0, `rgba(${blendC.r},${blendC.g},${blendC.b},0.12)`);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Draw both crystals at SAME center, one rotated +22.5°, other -22.5°
  const ROT = 22.5 * Math.PI / 180;

  drawCrystalOnContextRotated(ctx, t1, cx, cy, 1.0, 0.82, +ROT);
  drawCrystalOnContextRotated(ctx, t2, cx, cy, 1.0, 0.82, -ROT);

  // Center star
  const starGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 14);
  starGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
  starGrad.addColorStop(0.3, `rgba(${blendC.r+80},${blendC.g+80},${blendC.b+80},0.3)`);
  starGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = starGrad;
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCrystalOnContextRotated(ctx, type, cx, cy, scale, globalAlpha, rotation) {
  const channels = {};
  type.funcs.forEach((f,i) => channels[f] = i+1);
  const blend = blendColors(type.funcs);

  const R = [0, 80, 56, 34, 17].map(r => r * scale);

  // Apply rotation to axes
  const tips = {};
  for (const [f,ch] of Object.entries(channels)) {
    const baseAngle = FUNC_AXIS[f];
    const angle = baseAngle + rotation;
    tips[f] = { x: cx + Math.cos(angle)*R[ch], y: cy + Math.sin(angle)*R[ch] };
  }

  const tE=tips.E, tM=tips.M, tR=tips.R, tL=tips.L;

  ctx.save();
  ctx.globalAlpha = globalAlpha;
  ctx.globalCompositeOperation = 'screen';

  const faces = [
    {pts:[cx,cy,tE.x,tE.y,tR.x,tR.y], f1:'E',f2:'R', b:0.85},
    {pts:[cx,cy,tE.x,tE.y,tL.x,tL.y], f1:'E',f2:'L', b:0.65},
    {pts:[cx,cy,tM.x,tM.y,tR.x,tR.y], f1:'M',f2:'R', b:0.55},
    {pts:[cx,cy,tM.x,tM.y,tL.x,tL.y], f1:'M',f2:'L', b:0.40},
  ];

  faces.forEach(face => {
    const c1=FUNC_COLORS[face.f1], c2=FUNC_COLORS[face.f2];
    const bf={ r:Math.round((c1.r+c2.r)/2), g:Math.round((c1.g+c2.g)/2), b:Math.round((c1.b+c2.b)/2) };
    const alpha = 0.14 + face.b * 0.18;
    const pts = face.pts;

    const grad = ctx.createLinearGradient(pts[0],pts[1],pts[4],pts[5]);
    grad.addColorStop(0, `rgba(${bf.r},${bf.g},${bf.b},${alpha+0.1})`);
    grad.addColorStop(1, `rgba(${Math.round(blend.r*.5)},${Math.round(blend.g*.5)},${Math.round(blend.b*.5)},${alpha*.4})`);

    ctx.beginPath();
    ctx.moveTo(pts[0],pts[1]); ctx.lineTo(pts[2],pts[3]); ctx.lineTo(pts[4],pts[5]);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

    ctx.beginPath();
    ctx.moveTo(pts[0],pts[1]); ctx.lineTo(pts[2],pts[3]); ctx.lineTo(pts[4],pts[5]);
    ctx.closePath();
    ctx.strokeStyle=`rgba(${bf.r+80},${bf.g+80},${bf.b+80},0.5)`;
    ctx.lineWidth=1.0; ctx.stroke();
  });

  // Outer silhouette
  ctx.beginPath();
  ctx.moveTo(tE.x,tE.y); ctx.lineTo(tR.x,tR.y); ctx.lineTo(tM.x,tM.y); ctx.lineTo(tL.x,tL.y);
  ctx.closePath();
  ctx.strokeStyle=`rgba(${blend.r+100},${blend.g+100},${blend.b+100},0.65)`;
  ctx.lineWidth=1.5; ctx.stroke();

  ctx.restore();
  ctx.save();
  ctx.globalAlpha = globalAlpha;
  ctx.globalCompositeOperation = 'screen';

  // Core glow
  const coreGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,24*scale);
  coreGrad.addColorStop(0, `rgba(${blend.r},${blend.g},${blend.b},0.45)`);
  coreGrad.addColorStop(0.5, `rgba(${blend.r},${blend.g},${blend.b},0.12)`);
  coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=coreGrad;
  ctx.beginPath(); ctx.arc(cx, cy, 80*scale, 0, Math.PI*2); ctx.fill();

  // Tip glows
  for (const [f,ch] of Object.entries(channels)) {
    const tip=tips[f], fc=FUNC_COLORS[f];
    const size=[0,7,5,3.5,2][ch]*scale;
    const glowR=[0,20,13,8,5][ch]*scale;
    const a=[0,0.5,0.35,0.22,0.12][ch];
    const glow=ctx.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,glowR);
    glow.addColorStop(0,`rgba(${fc.r},${fc.g},${fc.b},${a})`);
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(tip.x,tip.y,glowR,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(tip.x,tip.y,size,0,Math.PI*2);
    ctx.fillStyle=`rgba(${fc.r},${fc.g},${fc.b},0.9)`; ctx.fill();
  }

  ctx.restore();
}

// ── CALCULATE ─────────────────────────────────────────────────────────────────
function calculate() {
  const i1 = parseInt(document.getElementById('type1').value);
  const i2 = parseInt(document.getElementById('type2').value);
  const t1 = TYPES[i1], t2 = TYPES[i2];

  const analysis = analyzePair(t1, t2);
  const bond = classifyBond(t1, t2);
  const bondData = BONDS[bond];

  // Bond banner
  document.getElementById('bondSymbol').textContent = bondData.sym;
  document.getElementById('bondName').textContent = bond;
  document.getElementById('bondName').style.color = bondData.color;
  document.getElementById('bondTension').textContent = `Tension: ${bondData.tension}%`;

  // Tension bar
  const fill = document.getElementById('tensionFill');
  const pct = bondData.tension;
  const barColor = pct <= 25 ? '#44cc88' : pct <= 50 ? '#ccaa44' : pct <= 75 ? '#ff8844' : '#ff4444';
  fill.style.width = pct + '%';
  fill.style.background = `linear-gradient(90deg, ${barColor}88, ${barColor})`;
  document.getElementById('tensionPct').textContent = `${pct}% tension`;

  // Merged crystal
  drawMergedCrystals(t1, t2, bond);
  document.getElementById('cname1').textContent = t1.name;
  document.getElementById('cname2').textContent = t2.name;
  document.getElementById('ctagline1').textContent = 'Soul Origin';
  document.getElementById('ctagline2').textContent = 'Soul Origin';

  // Function grid
  const grid = document.getElementById('funcGrid');
  grid.innerHTML = '';
  for (const f of ['R','E','M','L']) {
    const {c1,c2,q} = analysis[f];
    const fc = FUNC_COLORS[f];
    const cell = document.createElement('div');
    cell.className = `func-cell ${QUALITY_CSS[q]}`;
    cell.style.borderColor = `rgba(${fc.r},${fc.g},${fc.b},0.2)`;
    cell.innerHTML = `
      <div class="func-sym">${fc.sym}</div>
      <div class="func-name" style="color:${fc.hex}">${fc.element}</div>
      <div class="pair-quality ${QUALITY_CSS[q]}">${QUALITY_LABEL[q]}</div>
      <div class="pair-desc">${QUALITY_DESC[q]}</div>
    `;
    grid.appendChild(cell);
  }

  // Bond description
  document.getElementById('bondWhy').textContent = BOND_WHY[bond] || '';
  document.getElementById('bondHow').textContent = BOND_HOW[bond] || '';

  // Show result
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'flex';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── POPULATE SELECTS ──────────────────────────────────────────────────────────
function populateSelects() {
  ['type1','type2'].forEach((id, idx) => {
    const sel = document.getElementById(id);
    TYPES.forEach((t, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = t.name + ' Souls';
      if (i === (idx === 0 ? 12 : 0)) opt.selected = true; // default: Andromedan + Siriusian
      sel.appendChild(opt);
    });
  });
}

populateSelects();
</script>
