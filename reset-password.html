<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Twin Frequency — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07060f;
      --gold: #c9a96e;
      --gold-soft: #d4b483;
      --text: #e8e0d0;
      --muted: #6b6478;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .logo em {
      font-style: italic;
      color: var(--gold);
    }

    .form-wrap {
      width: 100%;
      max-width: 340px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.7s;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--text);
      text-align: center;
      margin-bottom: 8px;
    }

    .form-subtitle {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,110,0.2);
      border-radius: 2px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: rgba(201,169,110,0.5);
      background: rgba(255,255,255,0.07);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, rgba(201,169,110,0.15), rgba(201,169,110,0.08));
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 2px;
      color: var(--gold-soft);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.15));
      border-color: rgba(201,169,110,0.7);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--gold-soft);
      min-height: 20px;
    }

    .message.error { color: #e07070; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
  <div class="logo">Twin<em>F</em></div>

  <div class="form-wrap">
    <div class="form-title">New password</div>
    <div class="form-subtitle">Choose a new frequency key</div>

    <div class="input-group">
      <input type="password" id="new-password" placeholder="New password" autocomplete="new-password">
    </div>
    <div class="input-group">
      <input type="password" id="confirm-password" placeholder="Confirm password" autocomplete="new-password">
    </div>
    <button class="btn-primary" onclick="updatePassword()">Set new password</button>
    <div class="message" id="msg"></div>
  </div>
</div>

<script>
  // Stars
  const canvas = document.getElementById('stars')
  const ctx = canvas.getContext('2d')
  let stars = []
  function resizeCanvas() {
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
    stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2,
      a: Math.random(),
      speed: 0.003 + Math.random() * 0.005
    }))
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    stars.forEach(s => {
      s.a += s.speed
      ctx.beginPath()
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(232,224,208,${0.2 + 0.5 * Math.abs(Math.sin(s.a))})`
      ctx.fill()
    })
    requestAnimationFrame(drawStars)
  }
  window.addEventListener('resize', resizeCanvas)
  resizeCanvas()
  drawStars()

  // Supabase
  const SUPABASE_URL = 'https://pewgupxikbswhaqxjrwk.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBld2d1cHhpa2Jzd2hhcXhqcndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjY0MTEsImV4cCI6MjA5MDg0MjQxMX0.rQIz0R_4Oz6VqHgSvjx9YAtF8BojdcMU7RcqDiVP1NU'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  function setMsg(text, isError = false) {
    const el = document.getElementById('msg')
    el.textContent = text
    el.className = 'message' + (isError ? ' error' : '')
  }

  async function updatePassword() {
    const pw = document.getElementById('new-password').value
    const pw2 = document.getElementById('confirm-password').value
    if (!pw) return setMsg('Please enter a new password', true)
    if (pw.length < 6) return setMsg('Password must be at least 6 characters', true)
    if (pw !== pw2) return setMsg('Passwords do not match', true)

    setMsg('Updating...')
    const { error } = await sb.auth.updateUser({ password: pw })
    if (error) return setMsg(error.message, true)
    setMsg('Password updated ✦ Redirecting...')
    setTimeout(() => { window.location.href = 'login.html' }, 2000)
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') updatePassword()
  })
</script>
</body>
</html>
