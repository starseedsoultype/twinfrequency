<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07091e;
      --gold: #d4af37;
      --gold-dim: rgba(212,175,55,0.22);
      --violet: #a855f7;
      --violet-dim: rgba(168,85,247,0.15);
      --text: #e8e8f0;
      --muted: #8888a0;
      --nav-h: 64px;
    }

    html { height: 100%; height: -webkit-fill-available; }

    body {
      height: 100%;
      height: -webkit-fill-available;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 0%, #1a1050 0%, var(--bg) 65%);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 80px 150px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 110px 40px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 150px 90px, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 170px 20px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 60px 120px, rgba(212,175,55,0.5), transparent),
        radial-gradient(1px 1px at 190px 140px, rgba(255,255,255,0.7), transparent);
      background-repeat: repeat;
      background-size: 200px 180px;
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
    }

    /* ── HINT ── */
    .hint {
      flex-shrink: 0;
      z-index: 10;
      text-align: center;
      padding: 7px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(7,9,30,0.7);
      border-bottom: 1px solid rgba(212,175,55,0.08);
    }

    /* ── STAGE ── */
    #stage {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── PAGE ── */
    .page {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .page.active { display: flex; animation: fadeIn 0.35s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── PAGE HEADER ── */
    .page-header {
      flex-shrink: 0;
      text-align: center;
      padding: 18px 24px 0;
      position: relative;
    }

    .page-num {
      position: absolute;
      top: 14px; right: 20px;
      font-family: 'Raleway', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: 0.4;
    }

    .page-star {
      font-size: 14px;
      opacity: 0.55;
      margin-bottom: 6px;
      display: block;
    }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.2rem, 4.5vw, 2rem);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .page-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      font-style: italic;
      color: var(--violet);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .page-divider {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto;
    }

    /* ── PAGE BODY ── */
    .page-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 28px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }
    .page-body::-webkit-scrollbar { width: 3px; }
    .page-body::-webkit-scrollbar-track { background: transparent; }
    .page-body::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* ── TEXT CONTENT ── */
    .page-text {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      line-height: 1.85;
      color: var(--text);
      max-width: 660px;
      margin: 0 auto;
    }

    .page-text .intro {
      text-align: center;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem);
      line-height: 1.9;
      margin-bottom: 20px;
      color: rgba(232,232,240,0.9);
    }

    /* Section labels */
    .section {
      margin-bottom: 16px;
    }

    .section-label {
      font-family: 'Raleway', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 5px;
    }

    .section-text {
      font-size: clamp(0.88rem, 1.9vw, 1rem);
      line-height: 1.85;
      color: rgba(232,232,240,0.85);
    }

    /* Divider between sections */
    .section-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 14px 0;
    }

    /* Cover page */
    .page.cover .page-body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page.cover .page-title { font-size: clamp(1.5rem, 5.5vw, 2.6rem); }
    .page.cover .page-text  { text-align: center; }
    .page.cover .intro { font-size: clamp(1rem, 2.5vw, 1.2rem); }

    /* CTA */
    .cta-wrap { text-align: center; margin-top: 24px; }
    .cta-link {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid var(--gold);
      border-radius: 40px;
      color: var(--gold);
      text-decoration: none;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }
    .cta-link:hover, .cta-link:active { background: var(--gold); color: var(--bg); }

    /* ── NAV ── */
    .nav {
      flex-shrink: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: var(--nav-h);
      padding: 0 16px env(safe-area-inset-bottom, 0px);
      background: rgba(7,9,30,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(212,175,55,0.1);
    }

    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(107,70,193,0.2);
      color: var(--gold);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
    }
    .nav-btn:hover  { background: rgba(212,175,55,0.15); box-shadow: 0 0 16px rgba(212,175,55,0.3); }
    .nav-btn:active { transform: scale(0.88); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .nav-counter {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: 0.7;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 200px;
    }
    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.3;
      transition: background 0.3s, opacity 0.3s, transform 0.3s;
      flex-shrink: 0;
    }
    .dot.active { background: var(--gold); opacity: 1; transform: scale(1.6); }

    /* ── DESKTOP ── */
    @media (min-width: 600px) {
      .page-header { padding: 24px 48px 0; }
      .page-body   { padding: 20px 48px 24px; }
      .page-title  { font-size: clamp(1.4rem, 3vw, 2.2rem); }
    }
    @media (min-width: 900px) {
      .page-body { padding: 24px 100px 28px; }
    }

    /* ── LANDSCAPE MOBILE ── */
    @media (max-height: 480px) {
      .hint { display: none; }
      :root { --nav-h: 52px; }
      .page-header { padding: 10px 20px 0; }
      .page-star   { display: none; }
      .page-title  { font-size: clamp(1rem, 4vw, 1.4rem); margin-bottom: 3px; }
      .page-subtitle { margin-bottom: 6px; font-size: 0.82rem; }
      .page-divider  { display: none; }
      .page-body   { padding: 10px 20px 14px; }
      .section-label { font-size: 8px; }
      .section-text, .page-text .intro { font-size: 0.85rem; line-height: 1.65; }
      .section { margin-bottom: 10px; }
      .section-divider { margin: 8px 0; }
      .nav-btn { width: 38px; height: 38px; font-size: 20px; }
    }
  </style>
</head>

});

// Build TOC dynamically
const tocListEl = document.getElementById('toc-list');
if (tocListEl) {
  // Find indices of soul type pages (skip cover, toc, about, cta)
  const soulTypes = PAGES
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => !p.cover && !p.toc && !p.cta && !p.about);

  const tocHTML = soulTypes.map(({ p, i }) => {
    const num = i + 1;
    return `<div class="toc-item" onclick="show(${i})" style="
      display:flex; justify-content:space-between; align-items:center;
      padding: 7px 0; border-bottom: 1px solid rgba(255,215,0,0.1);
      cursor:pointer; transition: color 0.2s;
    ">
      <span style="color: var(--gold); font-family:'Cormorant Garamond',serif; font-size:1.05rem; letter-spacing:0.5px;">${p.title.replace(' Souls','')}</span>
      <span style="color: rgba(232,232,240,0.4); font-size:0.8rem; font-family:'Raleway',sans-serif; letter-spacing:1px;">${num}</span>
    </div>`;
  }).join('');

  tocListEl.innerHTML = `
    <div style="font-size:0.75rem; letter-spacing:2px; color:rgba(232,232,240,0.4); font-family:'Raleway',sans-serif; text-transform:uppercase; margin-bottom:12px;">Tap a name to jump directly</div>
    ${tocHTML}
  `;
}

// Build dots
PAGES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

totEl.textContent = PAGES.length;
prevBtn.disabled = true;

function show(idx) {
  const pages = stageEl.querySelectorAll('.page');
  const dots  = dotsEl.querySelectorAll('.dot');
  pages[cur].classList.remove('active');
  dots[cur].classList.remove('active');
  cur = idx;
  pages[cur].classList.add('active');
  dots[cur].classList.add('active');
  const body = pages[cur].querySelector('.page-body');
  if (body) body.scrollTop = 0;
  curEl.textContent = cur + 1;
  prevBtn.disabled  = cur === 0;
  nextBtn.disabled  = cur === PAGES.length - 1;
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < PAGES.length) show(n);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Touch swipe
let tx = 0, ty = 0, swiping = false;
document.addEventListener('touchstart', e => {
  tx = e.changedTouches[0].clientX;
  ty = e.changedTouches[0].clientY;
  swiping = false;
}, { passive: true });
document.addEventListener('touchmove', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - tx);
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if (dx > dy && dx > 12) swiping = true;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
}, { passive: true });
</script>
</body>
</html>
