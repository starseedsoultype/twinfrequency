<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Frequency</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a96e;
    --gold-soft: #e8d5b0;
    --deep: #04030a;
    --mid: #0d0b18;
    --text: #e8e0d5;
    --muted: #6b6478;
  }

  html, body {
    height: 100%;
    background: var(--deep);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    overflow: hidden;
  }

  /* STAR FIELD */
  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* NEBULA GLOW */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 {
    width: 500px; height: 500px;
    top: -100px; left: -100px;
    background: radial-gradient(circle, rgba(80,40,120,0.25) 0%, transparent 70%);
  }
  .nebula-2 {
    width: 400px; height: 400px;
    bottom: -50px; right: -50px;
    background: radial-gradient(circle, rgba(40,60,120,0.2) 0%, transparent 70%);
  }
  .nebula-3 {
    width: 300px; height: 300px;
    top: 40%; left: 40%;
    background: radial-gradient(circle, rgba(120,80,40,0.1) 0%, transparent 70%);
  }

  /* LAYOUT */
  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  /* SYMBOL */
  .symbol {
    width: 56px;
    height: 56px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.3s;
  }

  /* TITLE */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 8vw, 52px);
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--gold-soft);
    text-align: center;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.5s;
  }

  .title em {
    font-style: italic;
    color: var(--gold);
  }

  .tagline {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.7s;
  }

  /* DIVIDER */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 36px 0;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.9s;
  }

  /* FORM */
  .form-wrap {
    width: 100%;
    max-width: 340px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 1.1s;
  }

  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid rgba(201,169,110,0.2);
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 10px 0;
    cursor: pointer;
    transition: color 0.3s;
    position: relative;
  }

  .tab.active {
    color: var(--gold);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: var(--gold);
  }

  .input-group {
    margin-bottom: 16px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 2px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  input::placeholder { color: var(--muted); }

  input:focus {
    border-color: rgba(201,169,110,0.5);
    background: rgba(255,255,255,0.07);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, rgba(201,169,110,0.15), rgba(201,169,110,0.08));
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 2px;
    color: var(--gold-soft);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.15));
    border-color: rgba(201,169,110,0.7);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .separator {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 20px 0;
  }

  .separator::before, .separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,169,110,0.15);
  }

  .separator span {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .btn-google {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-google:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }

  .google-icon {
    width: 16px;
    height: 16px;
  }

  .message {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-align: center;
    min-height: 18px;
    color: var(--gold);
  }

  .message.error { color: #e07070; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* LOADING SCREEN */
  .loading-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--deep);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }

  .loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }

  .loading-pulse {
    width: 40px;
    height: 40px;
    border: 1px solid rgba(201,169,110,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="loading-pulse"></div>
</div>

<canvas id="stars"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="container">

  <!-- Symbol -->
  <svg class="symbol" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="28" cy="28" r="27" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <circle cx="28" cy="28" r="18" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
    <line x1="28" y1="1" x2="28" y2="55" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
    <line x1="1" y1="28" x2="55" y2="28" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
    <circle cx="28" cy="28" r="3" fill="#c9a96e" opacity="0.8"/>
    <circle cx="28" cy="10" r="1.5" fill="#c9a96e" opacity="0.5"/>
    <circle cx="28" cy="46" r="1.5" fill="#c9a96e" opacity="0.5"/>
    <circle cx="10" cy="28" r="1.5" fill="#c9a96e" opacity="0.5"/>
    <circle cx="46" cy="28" r="1.5" fill="#c9a96e" opacity="0.5"/>
  </svg>

  <h1 class="title">Twin<em>F</em></h1>
  <p class="tagline">Find your frequency</p>

  <div class="divider"></div>

  <div class="form-wrap">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('signin')">Enter</button>
      <button class="tab" onclick="switchTab('signup')">Join</button>
    </div>

    <!-- SIGN IN -->
    <div class="panel active" id="panel-signin">
      <div class="input-group">
        <input type="email" id="signin-email" placeholder="Your email" autocomplete="email">
      </div>
      <div class="input-group">
        <input type="password" id="signin-password" placeholder="Password" autocomplete="current-password">
      </div>
      <div style="text-align:right; margin-top:-8px; margin-bottom:4px;">
        <a href="#" onclick="showForgot(); return false;" style="font-size:10px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; text-decoration:none; transition:color 0.3s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
      </div>
      <button class="btn-primary" onclick="signIn()">Enter the frequency</button>
      <div class="separator"><span>or</span></div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGN UP -->
    <div class="panel" id="panel-signup">
      <div class="input-group">
        <input type="email" id="signup-email" placeholder="Your email" autocomplete="email">
      </div>
      <div class="input-group">
        <input type="password" id="signup-password" placeholder="Create password" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="signUp()">Begin your journey</button>
      <p style="font-size:11px;color:#6b6478;text-align:center;margin:12px 0 0;line-height:1.6;letter-spacing:0.03em">By joining, you agree to our <a href="legal.html" style="color:#c9a96e;text-decoration:none">Terms of Use</a> and <a href="legal.html" style="color:#c9a96e;text-decoration:none">Privacy Policy</a></p>
      <div class="separator"><span>or</span></div>
      <button class="btn-google" onclick="signInGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="message" id="msg"></div>
  </div>

</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const SUPABASE_URL = 'https://pewgupxikbswhaqxjrwk.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBld2d1cHhpa2Jzd2hhcXhqcndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjY0MTEsImV4cCI6MjA5MDg0MjQxMX0.rQIz0R_4Oz6VqHgSvjx9YAtF8BojdcMU7RcqDiVP1NU'
  // ──────────────────────────────────────────────────────────

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

 sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      window.location.href = 'https://starseedsoultype.github.io/starseed/onboarding.html'
    } else if (event === 'INITIAL_SESSION') {
      document.getElementById('loader').classList.add('hide')
    }
   })

  setTimeout(() => {
    document.getElementById('loader').classList.add('hide')
  }, 3000)

  // Stars canvas
  const canvas = document.getElementById('stars')
  const ctx = canvas.getContext('2d')
  let stars = []

  function resize() {
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2,
      o: Math.random() * 0.6 + 0.1,
      s: Math.random() * 0.3 + 0.05
    }))
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    stars.forEach(s => {
      s.o += Math.sin(Date.now() * s.s * 0.001) * 0.005
      ctx.beginPath()
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(232, 213, 176, ${Math.max(0.05, Math.min(0.7, s.o))})`
      ctx.fill()
    })
    requestAnimationFrame(drawStars)
  }

  window.addEventListener('resize', resize)
  resize()
  drawStars()

  // Обработка URL-параметров: ?join=1&origin=Pleiadian (пришёл с квиза)
  const urlParams = new URLSearchParams(window.location.search)
  if (urlParams.get('join') === '1') {
    switchTab('signup')
    // Сохраняем Origin в sessionStorage — после регистрации передадим в onboarding
    const originFromQuiz = urlParams.get('origin')
    if (originFromQuiz) {
      sessionStorage.setItem('quiz_origin', originFromQuiz)
      // Показываем подсказку под формой
      const hint = document.createElement('div')
      hint.style.cssText = 'text-align:center;font-size:11px;color:#c9a96e;letter-spacing:2px;margin-top:12px;opacity:0.8;'
      hint.textContent = 'Your Origin: ' + originFromQuiz
      document.getElementById('panel-signup').appendChild(hint)
    }
  }

  // Tab switching
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'))
    })
    document.getElementById('panel-signin').classList.toggle('active', tab === 'signin')
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup')
    setMsg('')
  }

  function setMsg(text, isError = false) {
    const el = document.getElementById('msg')
    el.textContent = text
    el.className = 'message' + (isError ? ' error' : '')
  }

  // Sign In
  async function signIn() {
    const email = document.getElementById('signin-email').value.trim()
    const password = document.getElementById('signin-password').value
    if (!email || !password) return setMsg('Please enter your email and password', true)

    setMsg('Aligning frequencies...')
    const { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) return setMsg(error.message, true)
    window.location.href = 'https://starseedsoultype.github.io/starseed/onboarding.html'
  }

  // Forgot Password
  function showForgot() {
    const email = document.getElementById('signin-email').value.trim()
    if (!email) return setMsg('Enter your email above first', true)
    resetPassword(email)
  }

  async function resetPassword(email) {
    setMsg('Sending reset link...')
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    })
    if (error) return setMsg(error.message, true)
    setMsg('Reset link sent — check your email ✦')
  }

  // Sign Up
  async function signUp() {
    const email = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value
    if (!email || !password) return setMsg('Please enter your email and password', true)
    if (password.length < 6) return setMsg('Password must be at least 6 characters', true)

    setMsg('Opening the portal...')
    const { error } = await sb.auth.signUp({ email, password })
    if (error) return setMsg(error.message, true)
    // Если пришёл с квиза с известным Origin — передаём его в onboarding
    const savedOrigin = sessionStorage.getItem('quiz_origin')
    if (savedOrigin) {
      sessionStorage.removeItem('quiz_origin')
      setMsg('Check your email to confirm your frequency ✦')
      // После подтверждения email Supabase редиректнет в onboarding сам
      // Записываем в localStorage чтобы пережило перезагрузку
      localStorage.setItem('pending_origin', savedOrigin)
    } else {
      setMsg('Check your email to confirm your frequency ✦')
    }
  }

  // Google
  async function signInGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://starseedsoultype.github.io/starseed/onboarding.html' }
    })
    if (error) setMsg(error.message, true)
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.panel.active').id
      active === 'panel-signin' ? signIn() : signUp()
    }
  })
</script>
</body>
</html>
